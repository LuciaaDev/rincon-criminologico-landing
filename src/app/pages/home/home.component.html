<div>
    <!-- Slogan Content -->
    <div class="flex">
        <div class="flex flex-col p-2 justify-center md:items-start md:py-7 md:px-3 md:w-1/2 lg:items-start lg:py-14 lg:px-20 lg:w-1/2">
            <p class="red-title text-base mb-2 md:justify-start md:items-start lg:justify-start lg:items-start lg:text-lg">{{"home.slogan.title_slogan" | transloco}}</p>
            <p class="blue-content mb-3 md:justify-start md:items-start md:mb-2 lg:justify-start lg:items-start lg:mb-2">{{"home.slogan.intro_slogan" | transloco}}</p>
            <app-button class="flex justify-center items-center md:justify-start md:items-start lg:justify-start lg:items-start" 
            [text]="'home.slogan.btn_slogan'" [color]="'secondary'" [size]="'large'"></app-button>
        </div>
        @if(showHomeImgs) {
            <div class="image-container w-1/2 flex justify-center items-center p-3">
                <img class="rounded-lg" src="../../../assets/images/home-slogan.png" alt="home-slogan">
            </div>
        }
    </div>
    
    <!-- Information access -->
     <div class="flex flex-col justify-center items-center py-4">
        <p class="red-title text-base pb-6 lg:text-lg">{{"home.info_access.title_info" | transloco}}</p>
        <div class="md:flex lg:flex">
            <app-card [hasIcon]="true" [iconUrl]="brainIconUrl" [cardTitle]="'home.info_access.title_articles'" 
            [cardText]="'home.info_access.explain_articles'" [cardColor]="'primary'" 
            [cardSize]="'medium'" [buttonText]="'home.info_access.btn_know_more'"></app-card>
            
            <app-card [hasIcon]="true" [iconUrl]="newsIconUrl" [cardTitle]="'home.info_access.title_news'" 
            [cardText]="'home.info_access.explain_news'" [cardColor]="'primary'" 
            [cardSize]="'medium'" [buttonText]="'home.info_access.btn_know_more'"></app-card>

            <app-card [hasIcon]="true" [iconUrl]="reflectionIconUrl" [cardTitle]="'home.info_access.title_reflections'" 
            [cardText]="'home.info_access.explain_reflections'" [cardColor]="'primary'" 
            [cardSize]="'medium'" [buttonText]="'home.info_access.btn_know_more'"></app-card>
        </div>
    </div>

    <!-- Free and Premium Content -->
    <div class="flex py-4 px-3">
        @if(showHomeImgs) {
            <div class="image-container w-1/2 flex justify-center items-center p-3">
                <img class="rounded-lg" src="../../../assets/images/home-content.jpg" alt="home-content">
            </div>
        }
        <div class="lg:w-1/2 lg:p-3">
            <p class="red-title text-base lg:pb-3 lg:text-lg">{{"home.content.title_content" | transloco}}</p>
            <p class="blue-content mb-3 md:justify-start md:items-start md:mb-2 lg:justify-start lg:items-start lg:pb-3" 
                [innerHTML]="'home.content.explain_free_content' | transloco"></p>
            <app-button class="flex justify-center items-center mb-3 md:justify-start md:items-start lg:justify-start lg:items-start lg:pb-6" 
            [text]="'home.content.btn_free_content'" [color]="'secondary'" [size]="'large'"></app-button>
            
            <hr class="line-content mb-3 lg:pb-6">

            <p class="blue-content mb-3 md:justify-start md:items-start md:mb-2 lg:justify-start lg:items-start lg:pb-3" 
                [innerHTML]="'home.content.explain_premium_content' | transloco"></p>
            
            <div class="flex justify-center items-center bg-[#C1DDEB] border border-[#224558] w-14 h-14 rounded-full mb-3 mx-auto md:justify-start lg:justify-start">
                <span class="text-lg text-[#8c2538] font-bold">{{prize}}</span>
                <span class="text-base text-[#8c2538] font-bold mt-[5%]">{{euroSymbol}}</span>
            </div>
            
            <app-button class="flex justify-center items-center md:justify-start md:items-start lg:justify-start lg:items-start lg:pb-6" 
            [text]="'home.content.btn_premium_content'" [color]="'secondary'" [size]="'large'"></app-button>
        </div>
     </div>
</div>
