<div [ngClass]="['card-content', cardColor, cardSize]">
    @if(hasIcon) {
        <img class="icon-card" [src]="iconUrl" alt="icon-card">
    }
    <p class="card-title">{{cardTitle | transloco}}</p>

    @if(hasLine) {
        <hr class="line-title">
    }

    <p class="card-text">{{cardText | transloco}}</p>
    
    @if(hasButton) {
        <button class="btn-content"
        (click)="onClickCard()"
        >{{ buttonText | transloco }}</button>
    }
</div>
