<select
[ngClass]="['select-content', color, size]"
[disabled]="disabled"
[value]="selectedOption"
(change)="onSelectOption($event)"
>
@if(isDisabledSelectedHidden) {
    <option value="" disabled selected hidden>{{ disabledSelectedHiddenText | transloco }}</option>
} 

@for(option of optionsList; track option.value) {
    <option [value]="option.value">{{option.label | transloco}}</option>
}
</select>
